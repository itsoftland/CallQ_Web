{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-5 text-center">
                    <div class="stat-icon bg-success bg-opacity-10 text-success rounded-circle p-3 d-inline-block mb-3">
                        <i class="fas fa-check-circle fa-2x"></i>
                    </div>
                    <h4 class="fw-bold mb-3">Password Updated!</h4>
                    <p class="text-secondary mb-4">Your password has been set. You may now log in with your new
                        credentials.</p>

                    <div class="d-grid shadow-sm">
                        <a href="{% url 'login' %}" class="btn btn-primary fw-bold py-2 rounded-3">Log In Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
