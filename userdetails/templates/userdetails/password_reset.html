{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 text-center">
                    <div class="stat-icon bg-primary bg-opacity-10 text-primary rounded-circle p-3 d-inline-block mb-3">
                        <i class="fas fa-lock fa-2x"></i>
                    </div>
                    <h4 class="fw-bold mb-3">Password Reset</h4>
                    <p class="text-secondary small mb-4">Enter your email address below and we'll send you a link to
                        reset your password.</p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4 text-start">
                            <label class="form-label fw-semibold small text-uppercase tracking-wider">Email
                                Address</label>
                            <input type="email" name="email" class="form-control bg-light border-0 py-2"
                                placeholder="name@example.com" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold py-2 rounded-3">Send Reset
                                Link</button>
                        </div>
                    </form>

                    <div class="mt-4">
                        <a href="{% url 'profile' %}" class="text-decoration-none small text-secondary">
                            <i class="fas fa-arrow-left me-1"></i> Back to Profile
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
