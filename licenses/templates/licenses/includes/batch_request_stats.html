<div class="row g-3 mb-4">
    <div class="col-md-4 col-sm-6">
        <div class="card h-100 border shadow-none">
            <div class="card-body p-3">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <div class="text-secondary small fw-medium mb-1">Pending Requests</div>
                        <div class="h3 fw-bold mb-0 text-warning">{{ pending_count }}</div>
                    </div>
                    <div class="p-2 bg-light rounded shadow-sm text-warning">
                        <i class="fas fa-clock fa-lg"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4 col-sm-6">
        <div class="card h-100 border shadow-none">
            <div class="card-body p-3">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <div class="text-secondary small fw-medium mb-1">Approved</div>
                        <div class="h3 fw-bold mb-0 text-success">{{ approved_count }}</div>
                    </div>
                    <div class="p-2 bg-light rounded shadow-sm text-success">
                        <i class="fas fa-check-circle fa-lg"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4 col-sm-6">
        <div class="card h-100 border shadow-none">
            <div class="card-body p-3">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <div class="text-secondary small fw-medium mb-1">Rejected</div>
                        <div class="h3 fw-bold mb-0 text-danger">{{ rejected_count }}</div>
                    </div>
                    <div class="p-2 bg-light rounded shadow-sm text-danger">
                        <i class="fas fa-times-circle fa-lg"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
